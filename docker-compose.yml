# =================================================================
# 招投标文件智能审核系统 - Docker Compose 生产环境配置
# 适用: 2核2G 宝塔VPS
# =================================================================

services:
  # ===== PostgreSQL 数据库 =====
  db:
    image: postgres:15-alpine
    container_name: bid-review-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: bid_review
      POSTGRES_USER: bid_review
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bid_review -d bid_review"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 384M
    networks:
      - bid-review-net

  # ===== FastAPI 后端 =====
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bid-review-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://bid_review:${DB_PASSWORD}@db:5432/bid_review
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./data:/app/data
    ports:
      - "127.0.0.1:8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - bid-review-net

  # ===== Nginx 前端 + 反向代理 =====
  frontend:
    image: nginx:1.25-alpine
    container_name: bid-review-frontend
    restart: unless-stopped
    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./deploy/nginx-docker.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend:
        condition: service_healthy
    ports:
      # 宝塔面板通常占用公网 80/443；默认仅绑定本机端口，由宝塔反向代理到 http://127.0.0.1:8080
      - "${FRONTEND_BIND:-127.0.0.1}:${FRONTEND_HTTP_PORT:-8080}:80"
    deploy:
      resources:
        limits:
          memory: 128M
    networks:
      - bid-review-net

networks:
  bid-review-net:
    driver: bridge

volumes:
  pgdata:
    driver: local
